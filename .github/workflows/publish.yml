name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run pack:dry

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          node -e "const pkg = require('./package.json'); const tag = process.env.GITHUB_REF_NAME; if (tag !== 'v' + pkg.version) { console.error('tag ' + tag + ' does not match package version v' + pkg.version); process.exit(1); }"

      - run: npm publish
